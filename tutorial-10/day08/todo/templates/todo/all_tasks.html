<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Tasks</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7f8;
            margin: 0;
            padding: 0;
            color: #333;
        }
        header {
            background: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #f8f8f8;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            padding: 15px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .task-info {
            flex: 1;
        }
        .status {
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 5px;
            color: white;
            margin-left: 10px;
        }
        .todo { background: #007bff; }
        .inprogress { background: #28a745; }
        .done { background: #fd7e14; }
        .actions button {
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            margin-left: 5px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }
        .actions .edit-btn { background: #17a2b8; }
        .actions .edit-btn:hover { background: #138496; }
        .actions .delete-btn { background: #dc3545; }
        .actions .delete-btn:hover { background: #c82333; }
        .nav-links a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: white;
            background: #007bff;
            padding: 10px 20px;
            border-radius: 5px;
            transition: 0.2s;
        }
        .nav-links a:hover {
            background: #0056b3;
        }
        form { display: inline; }
    </style>
</head>
<body>
    <header>
        <h1>All Tasks</h1>
    </header>
    <div class="container">
        {% if tasks %}
        <ul>
            {% for task in tasks %}
                <li>
                    <div class="task-info">
                        <strong>{{ task.title }}</strong> - {{ task.description }}
                        <span class="status {{ task.status }}">{{ task.status|title }}</span>
                    </div>
                    <div class="actions">
                        <a href="{% url 'edit_task' task.id %}">
                            <button class="edit-btn">Update</button>
                        </a>
                        <form action="{% url 'delete_task' task.id %}" method="post">
                            {% csrf_token %}
                            <button type="submit" class="delete-btn">Delete</button>
                        </form>
                    </div>
                </li>
            {% endfor %}
        </ul>
        {% else %}
            <p>No tasks found.</p>
        {% endif %}
        <div class="nav-links">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'add_task' %}">Add New Task</a>
        </div>
    </div>
</body>
</html>
