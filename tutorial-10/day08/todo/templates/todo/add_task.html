<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7f8;
            margin: 0;
            padding: 0;
            color: #333;
        }
        header {
            background: #28a745;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { color: #28a745; text-align: center; }
        form button {
            background: #007bff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        form button:hover {
            background: #0056b3;
        }
        .nav-links {
            margin-top: 20px;
            text-align: center;
        }
        .nav-links a {
            text-decoration: none;
            color: white;
            background: #6c757d;
            padding: 10px 20px;
            border-radius: 5px;
            margin: 5px;
            display: inline-block;
        }
        .nav-links a:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <header>
        <h1>Add New Task</h1>
    </header>
    <div class="container">
        <form action="{% url 'add_task' %}" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Add Task</button>
        </form>
        <div class="nav-links">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'all_tasks' %}">View All Tasks</a>
        </div>
    </div>
</body>
</html>
