<!DOCTYPE html>
<html lang="en">
<head>
    <title>Todo App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: auto;
            margin-top: 40px;
        }

        h1, h2 {
            text-align: center;
            color: #333;
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }

        button {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-add {
            background: #28a745;
            color: white;
        }

        .btn-update {
            background: #007bff;
            color: white;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-add:hover { background: #218838; }
        .btn-update:hover { background: #0069d9; }
        .btn-delete:hover { background: #c82333; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th, table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        table th {
            background: #007bff;
            color: white;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .empty {
            text-align: center;
            color: #888;
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>📝 Todo App</h1>

    <!-- Form -->
    <div class="card">
        <form action="/" method="POST">
            <label>Title:</label>
            <input type="text" name="title" required>

            <label>Description:</label>
            <textarea name="desc" required></textarea>

            <button type="submit" class="btn-add">+ Add Task</button>
        </form>
    </div>

    <!-- Todo List -->
    <h2>Your Todos</h2>

    <div class="card">
        {% if alltodos|length == 0 %}
            <p class="empty">No tasks yet 🚀</p>
        {% else %}
            <table>
                <tr>
                    <th>S.No</th>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>

                {% for todo in alltodos %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td>{{ todo.title }}</td>
                    <td>{{ todo.desc }}</td>
                    <td>{{ todo.date_created }}</td>
                    <td class="actions">
                        <a href="/update/{{ todo.id }}">
                            <button class="btn-update">Update</button>
                        </a>

                        <a href="/delete/{{ todo.id }}">
                            <button class="btn-delete">Delete</button>
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </table>
        {% endif %}
    </div>

</div>

</body>
</html>
