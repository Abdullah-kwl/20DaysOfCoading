<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
</head>
<body>
    <h1>Profile</h1>
    {% if profile %}
        <p>Name: {{ profile.name }}</p>
        <p>Roll Number: {{ profile.roll_number }}</p>
    {% else %}
        <p>{{ error }}</p>
    {% endif %}
</body>
</html>
